<!DOCTYPE html>
<html>
<head>

<title>vários nadas</title>
<link rel="icon" type="image/png" href="/VN.png" sizes="32x32">

<style>

body{
margin:0;
font-family: Georgia, serif;
background:#3b1200;
color:#f5e6d3;

}

/* HEADER IMAGE */

.header{
width:100%;
height:220px; /* adjust height */
background-image:url("mandala_header.jpg");
  
background-size:cover;
background-position:center;

position:relative; /* IMPORTANT */
overflow:hidden;
}

.header::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;

background:rgba(73, 31, 13, 0.4); /* adjust opacity here */

z-index:1; /* stays below text */
}

/* TITLE */

.title{
text-align:center;
margin-top:-70px;
position:relative;
z-index:2; /* above overlay */
}

.title h1{
font-size:48px;
margin:10px 0;
}

.subtitle{
font-size:14px;
opacity:0.8;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
gap:20px;
padding:40px;
}

/* CARD */

.card{
background:#4a1a05;
padding:10px;
text-align:center;
transition:0.3s;
cursor:pointer;
}

.card img{
width:100%;
display:block;
}

.card:hover{
transform:scale(1.03);
background:#5c2208;
}

/* TAGS */

.tags{
font-size:12px;
margin-top:8px;
opacity:0.7;
color:#f5e6d3;
}

.status{
font-size:12px;
margin-top:6px;
opacity:0.8;
color:#9ad69a;
}

</style>

</head>

<body>

<div class="header"></div>

<div class="title">
<h1>vários nadas</h1>
<div class="subtitle">✨caça-palavras em mandala✨</div>
</div>

<div class="grid">

<a href="isa-mandala-puzzle-main" class="card">
<img src="isa-mandala-puzzle-main/Isa2026.png">
<div class="tags">#Isa2026 </div>
</a>

<a href="unrealunearth-main" class="card"
data-key="unrealPuzzleProgress"
data-total="23">
  
<img src="unrealunearth-main/unreal.png">
  
<div class="tags">#UnrealUnearth #Hozier</div>

<div class="status"></div>

</a>

<a href="TARITS" class="card"
data-key="TARITSPuzzleProgress"
data-total="20">
  
<img src="TARITS/mandala.png">
  
<div class="tags">#ThereAreRiversInTheSky #Livros</div>

<div class="status"></div>
</a>

<a href="PRANTAS" class="card"
data-key="prantasPuzzleProgress"
data-total="25">
  
<img src="PRANTAS/mandala_prantas.png">
  
<div class="tags">#VibeVegana #Verde #Plantas</div>

<div class="status"></div>
</a>

<a href="AJNA" class="card"
data-key="ajnaPuzzleProgress"
data-total="27">
  
<img src="AJNA/mandala_ajna.png">
  
<div class="tags">#Yoga #Chakras #Ajna</div>

<div class="status"></div>
</a>

<a href="bichanos" class="card"
data-key="gatosPuzzleProgress"
data-total="34">
  
<img src="bichanos/mandala_gatos.png">
  
<div class="tags">#gatos #caçatudomenospalavras</div>

<div class="status"></div>
</a>

<a href="goya" class="card"
data-key="goyaPuzzleProgress"
data-total="18">
  
<img src="goya/mandala_goya.png">
  
<div class="tags">#Bruxas #Pinturas #El Aquelarre</div>

<div class="status"></div>
</a>
  
</div>
<script>
window.addEventListener("load", function(){

document.querySelectorAll(".card").forEach(card => {

let key = card.dataset.key;
let total = parseInt(card.dataset.total);

/* SKIP cards without progress data */
if(!key || !total) return;

let data = JSON.parse(localStorage.getItem(key) || "[]");

let statusEl = card.querySelector(".status");

if(data.length === total && total > 0){

statusEl.textContent = "✔ completo";

}
else if(data.length > 0){

statusEl.textContent = data.length + " / " + total;

}
else{

statusEl.textContent = "";

}

});

});
</script>
</body>
</html>
